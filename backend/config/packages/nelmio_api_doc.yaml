nelmio_api_doc:
    documentation:
        openapi: 3.0.0
        info:
            title: Quai Antique API
            description: API REST du restaurant Quai Antique
            version: 1.0.0
        components:
            securitySchemes:
                X-AUTH-TOKEN:
                    type: apiKey
                    in: header
                    name: X-AUTH-TOKEN
    areas:
        default:
            path_patterns:
                - ^/api(?!/doc(?:\.json)?$)
