nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
        allow_headers: ['Content-Type', 'X-AUTH-TOKEN', 'Accept']
        max_age: 3600
        allow_credentials: false
    paths:
        '^/api/': null
